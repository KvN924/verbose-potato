<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>文言文翻譯器</title>

    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            font-size: 16px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            white-space: pre-wrap;
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h1>文言文翻譯器</h1>

    <textarea id="input" placeholder="貼上文言文..."></textarea>

    <br>

    <button onclick="translateText()">翻譯</button>

    <div id="result">結果會顯示在這裡</div>

    <script>
        async function translateText() {

            const input = document.getElementById("input").value;
            const resultDiv = document.getElementById("result");

            if (!input) {
                resultDiv.innerText = "請先輸入文言文";
                return;
            }

            resultDiv.innerText = "AI 思考中...";

            const apiKey = "AQ.Ab8RN6JeyQju1_21TtMGrDvdC7Qve75ZX8ckKwv5B1iWzGgLUA";

            const prompt = `
你是一位高中國文老師，請完成以下任務：

1. 白話翻譯
2. 重點字詞

文言文：
${input}
`;

            try {
                const response = await fetch(
                    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + apiKey,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            contents: [
                                {
                                    parts: [
                                        { text: prompt }
                                    ]
                                }
                            ]
                        })
                    }
                );

                const data = await response.json();

                console.log(data);

                const output = data?.candidates?.[0]?.content?.parts?.[0]?.text;

                if (!output) {
                    resultDiv.innerText = "沒有拿到結果，請檢查 API Key 或配額";
                    return;
                }

                resultDiv.innerText = output;

            } catch (error) {
                console.error(error);
                resultDiv.innerText = "發生錯誤：" + error;
            }
        }
    </script>

</body>
</html>
