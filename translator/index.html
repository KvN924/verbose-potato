<!DOCTYPE html>

<html>

<head>

    <title>文言文翻譯器</title>

</head>

<body>

    <h1>文言文翻譯器</h1>

    <textarea id=”input“ rows=”8“ cols=”50“></textarea>

    <br><br>

    <button onclick=”translateText()“>

        翻譯

    </button>

    <h2>結果</h2>

    <div id=”result“></div>

    <script>

        function translateText() {

            document.getElementById(”result“).innerText =

            ”這裡之後會顯示 AI 翻譯結果“;

        }

    </script>

</body>

</html>
